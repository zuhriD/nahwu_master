name: jurumiyah_app
description: "Nahwu Tutor - Belajar Ilmu Nahwu Arabic Grammar"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  google_fonts: ^6.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_tts: ^4.2.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  audioplayers: ^6.1.0
  youtube_player_flutter: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo_new.jpeg"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/icon/
    - assets/audio/
    - assets/profile/
    - assets/mindmapping/mind_map_irab_dan_pembagiannya.png
    - assets/mindmapping/mind_map_irab_pada_fiil.png
    - assets/mindmapping/mind_map_irab_pada_isim.png
    - assets/mindmapping/mind_map_isim_ghairu_munsarif.png
    - assets/mindmapping/mind_map_kalam.png
    - assets/mindmapping/mind_map_pembagian_kalimat.png
    - assets/mindmapping/mind_map_tanda_fiil.png
    - assets/mindmapping/mind_map_tanda_huruf.png
    - assets/mindmapping/mind_map_tanda_irab_jazm.png
    - assets/mindmapping/mind_map_tanda_irab_khafd.png
    - assets/mindmapping/mind_map_tanda_irab_nashab.png
    - assets/mindmapping/mind_map_tanda_irab_rafa.png
    - assets/mindmapping/mind_map_tanda_isim.png
